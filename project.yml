name: VoiceReaderApp
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: 17.0
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.18
targets:
  VoiceReaderApp:
    type: application
    platform: iOS
    sources:
      - App/Sources
    resources:
      - App/Resources
    info:
      path: App/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tonysheng.voicereader
        PRODUCT_NAME: VoiceReader
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    dependencies:
      - package: ZIPFoundation
  VoiceReaderAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    dependencies:
      - target: VoiceReaderApp
